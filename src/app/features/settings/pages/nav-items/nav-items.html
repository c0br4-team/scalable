<div class="flex min-h-0 flex-1 flex-col gap-5 overflow-y-auto p-4 lg:p-6">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-xl font-bold text-gray-900">{{ 'NAV_ITEM_CONFIG.TITLE' | translate }}</h1>
      <p class="mt-0.5 text-sm text-gray-500">{{ 'NAV_ITEM_CONFIG.SUBTITLE' | translate }}</p>
    </div>

    <button type="button" (click)="openCreateDrawer()"
      class="inline-flex items-center gap-2 rounded-xl bg-[#1e3a5f] px-4 py-2.5 text-sm font-semibold text-white transition-all hover:bg-[#16304f] focus:outline-none focus:ring-2 focus:ring-[#1e3a5f]/40 focus:ring-offset-2 active:scale-[0.98]">
      <ng-icon name="heroPlusCircle" class="text-base" />
      {{ 'NAV_ITEM_CONFIG.CREATE' | translate }}
    </button>
  </div>

  <div class="max-w-sm">
    <sce-search-bar
      [placeholder]="'NAV_ITEM_CONFIG.SEARCH_PLACEHOLDER' | translate"
      (search)="onSearch($event)"
      (cleared)="onSearch('')" />
  </div>

  <sce-data-table
    [columns]="columns"
    [data]="rows()"
    [loading]="isLoading()"
    [paginator]="paginator()"
    (pageChange)="onPageChange($event)"
    (rowClick)="onRowClick($event)" />
</div>

<app-nav-item-drawer
  [open]="drawerOpen()"
  [navItem]="editingNavItem()"
  [parentOptions]="selectedParentOptions()"
  [parentSearch]="parentSearch"
  (submitted)="onDrawerSubmit($event)"
  (deleted)="onDeleteRequested()"
  (closed)="closeDrawer()" />
