<div class="p-4 lg:p-6">

  <div class="flex items-center justify-between mb-4">
    <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide">
      Notas internas
      <span class="ml-1 px-1.5 py-0.5 text-xs bg-gray-100 text-gray-600 rounded-full font-normal">{{ notes.length }}</span>
    </h3>
    <button type="button"
            class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-white bg-[#1e3a5f] hover:bg-[#162d4a] rounded-lg transition-colors">
      <ng-icon name="heroPlus" class="text-base" />
      Nueva nota
    </button>
  </div>

  @if (!notes.length) {
  <div class="flex flex-col items-center justify-center py-12 text-center bg-white rounded-xl border border-dashed border-gray-200">
    <ng-icon name="heroPencil" class="text-4xl text-gray-200 mb-3" />
    <p class="text-sm font-medium text-gray-500">Sin notas internas</p>
    <p class="text-xs text-gray-400 mt-1">Agrega notas privadas del expediente</p>
  </div>
  } @else {
  <div class="space-y-2">
    @for (note of notes; track note.id) {
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <button type="button"
              class="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-gray-50 transition-colors"
              (click)="toggleNote(note.id)">
        <div>
          <p class="text-sm font-semibold text-gray-800">{{ note.title }}</p>
          <p class="text-xs text-gray-400 mt-0.5">{{ note.authorName }} · {{ formatDate(note.updatedAt) }}</p>
        </div>
        <ng-icon name="heroChevronDown" class="text-base text-gray-400 transition-transform duration-200"
                 [class.rotate-180]="expandedNote() === note.id" />
      </button>
      @if (expandedNote() === note.id) {
      <div class="px-4 pb-4 pt-0 border-t border-gray-100">
        <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-line mt-3">{{ note.content }}</p>
      </div>
      }
    </div>
    }
  </div>
  }

</div>
