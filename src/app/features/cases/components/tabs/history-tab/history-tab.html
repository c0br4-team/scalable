<div class="p-4 lg:p-6">

  <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">
    Historial de acciones
    <span class="ml-1 px-1.5 py-0.5 text-xs bg-gray-100 text-gray-600 rounded-full font-normal">{{ history.length }}</span>
  </h3>

  @if (!history.length) {
  <div class="flex flex-col items-center justify-center py-12 text-center bg-white rounded-xl border border-dashed border-gray-200">
    <ng-icon name="heroClock" class="text-4xl text-gray-200 mb-3" />
    <p class="text-sm font-medium text-gray-500">Sin historial registrado</p>
  </div>
  } @else {
  <div class="relative">
    <!-- Vertical line -->
    <div class="absolute left-4 top-0 bottom-0 w-px bg-gray-200"></div>

    <div class="space-y-0">
      @for (entry of history; track entry.id) {
      <div class="relative flex gap-4 pb-5">
        <!-- Icon dot -->
        <div class="shrink-0 w-8 h-8 rounded-full flex items-center justify-center z-10"
             [class]="clsForAction(entry.action)">
          <ng-icon [name]="iconForAction(entry.action)" style="font-size:14px" />
        </div>
        <!-- Content -->
        <div class="flex-1 bg-white rounded-xl border border-gray-200 p-3 min-w-0">
          <p class="text-sm text-gray-800 leading-snug">{{ entry.description }}</p>
          <div class="flex items-center gap-2 mt-1.5">
            <span class="text-xs font-medium text-gray-500">{{ entry.performedBy }}</span>
            <span class="text-xs text-gray-300">·</span>
            <span class="text-xs text-gray-400">{{ formatDate(entry.performedAt) }}</span>
          </div>
        </div>
      </div>
      }
    </div>
  </div>
  }

</div>
