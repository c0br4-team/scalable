<div class="p-4 lg:p-6 space-y-4">

  <!-- Comment list -->
  @if (!comments.length) {
  <div class="flex flex-col items-center justify-center py-12 text-center bg-white rounded-xl border border-dashed border-gray-200">
    <ng-icon name="heroChatBubbleLeftEllipsis" class="text-4xl text-gray-200 mb-3" />
    <p class="text-sm font-medium text-gray-500">Sin comentarios aún</p>
  </div>
  } @else {
  <div class="space-y-3">
    @for (comment of comments; track comment.id) {
    <div class="bg-white rounded-xl border border-gray-200 p-4 flex gap-3">
      <div class="w-8 h-8 rounded-full bg-[#1e3a5f] text-white flex items-center justify-center text-xs font-bold shrink-0">
        {{ initials(comment.authorName) }}
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-baseline gap-2 mb-1">
          <span class="text-sm font-semibold text-gray-800">{{ comment.authorName }}</span>
          <span class="text-xs text-gray-400">{{ formatDate(comment.createdAt) }}</span>
        </div>
        <p class="text-sm text-gray-700 leading-relaxed">{{ comment.text }}</p>
      </div>
    </div>
    }
  </div>
  }

  <!-- New comment form -->
  <div class="bg-white rounded-xl border border-gray-200 p-4">
    <textarea
      rows="3"
      placeholder="Escribe un comentario..."
      class="w-full text-sm text-gray-800 resize-none focus:outline-none"
      [value]="newComment()"
      (input)="newComment.set($any($event.target).value)">
    </textarea>
    <div class="flex justify-end mt-2 pt-2 border-t border-gray-100">
      <button type="button"
              class="px-4 py-1.5 text-sm font-medium text-white bg-[#1e3a5f] hover:bg-[#162d4a] rounded-lg transition-colors disabled:opacity-50"
              [disabled]="!newComment().trim()"
              (click)="addComment()">
        Comentar
      </button>
    </div>
  </div>

</div>
