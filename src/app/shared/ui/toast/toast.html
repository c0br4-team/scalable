<div class="fixed z-[9998] flex flex-col gap-2 w-80 pointer-events-auto group"
  [class]="positionClasses(toastService.config().position)">
  @for (toast of toastService.toasts(); track trackById($index, toast)) {
  <div [@toast] class="relative rounded-xl shadow-lg overflow-hidden pointer-events-auto group"
    [class]="cardClasses(toast.type)" (mouseenter)="toastService.pause(toast.id)"
    (mouseleave)="toastService.resume(toast.id)">
    <!-- Contenido -->
    <div class="flex gap-3 px-4 pt-3.5" [class.items-center]="!toast.title" [class.items-start]="toast.title"
      [class.pb-3]="!toast.progress" [class.pb-2]="toast.progress">

      <!-- Icono -->
      <ng-icon [name]="toastIconName(toast.type)" class="shrink-0 text-2xl" [class]="iconClasses(toast.type)" />

      <!-- Texto -->
      <div class="flex-1 min-w-0">
        @if (toast.title) {
        <p class="text-sm font-semibold text-gray-900 leading-tight">{{ toast.title }}</p>
        }
        <p class="text-sm text-gray-600 leading-snug" [class.mt-0.5]="toast.title">{{ toast.message }}</p>

        <!-- Acción -->
        @if (toast.action) {
        <button (click)="toast.action.onClick(); toastService.dismiss(toast.id)"
          class="mt-2 text-xs font-semibold underline underline-offset-2 hover:opacity-70 transition-opacity"
          [class]="iconClasses(toast.type)">
          {{ toast.action.label }}
        </button>
        }
      </div>

      <!-- Cerrar -->
      @if (toast.dismissible) {
      <button (click)="toastService.dismiss(toast.id)"
        class="shrink-0 text-gray-400 hover:text-gray-600 transition-colors" aria-label="Cerrar">
        <ng-icon name="heroXMark" class="text-base" />
      </button>
      }
    </div>

    <!-- Barra de progreso -->
    @if (toast.progress && toast.duration > 0) {
    <div class="h-0.5 w-full bg-gray-100">
      <div class="h-full animate-shrink origin-left" [class]="progressClasses(toast.type)"
        [style.animation-duration]="progressDuration(toast)"></div>
    </div>
    }
  </div>
  }
</div>
