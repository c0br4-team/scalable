<div class="flex flex-col w-44 text-sm">
  <button type="button"
    class="peer group w-full text-left px-4 pr-2 py-2 border rounded bg-white text-gray-700 border-gray-300 shadow-sm hover:bg-gray-50 focus:outline-none">
    <span>Select</span>
    <svg class="w-5 h-5 inline float-right transition-transform duration-200 -rotate-90 group-focus:rotate-0"
      xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#6B7280">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 9-7 7-7-7" />
    </svg>
  </button>

  <ul
    class="hidden overflow-hidden peer-focus:block w-full bg-white border border-gray-300 rounded shadow-md mt-1 py-2">
    @for (item of options; track $index) {
    <li class="px-4 py-2 hover:bg-indigo-500 hover:text-white cursor-pointer">{{ item }}</li>
    }
  </ul>
</div>
